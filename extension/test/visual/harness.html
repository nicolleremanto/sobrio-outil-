<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        font: 12px system-ui;
      }
      .grid {
        display: flex;
        gap: 0;
      }
      .col {
        flex: 1;
        padding: 24px 16px;
      }
      .col.light {
        background: #e9e7e2;
      }
      .col.dark {
        background: #14130f;
      }
      .col h2 {
        font: 600 13px system-ui;
        margin: 0 0 16px;
      }
      .col.light h2 {
        color: #1a1a18;
      }
      .col.dark h2 {
        color: #eceae4;
      }
      .cell {
        margin-bottom: 28px;
      }
      .lbl {
        display: block;
        font: 11px system-ui;
        opacity: 0.55;
        margin-bottom: 6px;
      }
      .col.dark .lbl {
        color: #eceae4;
      }
      /* Neutralise le position:fixed du panneau pour empiler les états. */
      .host {
        position: relative;
        min-height: 8px;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="col light">
        <h2>Thème clair</h2>
        <div class="cell">
          <span class="lbl">reco-simple</span>
          <div
            class="host"
            data-theme="light"
            data-state='{"key":"reco-simple","model":"Claude Haiku 4.5","confidence":0.8,"cost":"0,0004–0,0006","energy":"0,05–0,21","budget":true,"others":["Claude Sonnet 5","Claude Opus 4.8"]}'
          ></div>
        </div>
        <div class="cell">
          <span class="lbl">derogation</span>
          <div
            class="host"
            data-theme="light"
            data-state='{"key":"derogation","model":"Claude Haiku 4.5","confidence":0.8,"cost":"0,0004–0,0006","energy":"0,05–0,21","budget":true,"why":true,"others":["Claude Sonnet 5","Claude Opus 4.8"]}'
          ></div>
        </div>
        <div class="cell">
          <span class="lbl">budget-absent</span>
          <div
            class="host"
            data-theme="light"
            data-state='{"key":"budget-absent","model":"Claude Sonnet 5","confidence":0.7,"cost":"0,002–0,004","energy":"0,4–1,8","budget":false,"others":["Claude Haiku 4.5","Claude Opus 4.8"]}'
          ></div>
        </div>
        <div class="cell">
          <span class="lbl">suggestion</span>
          <div
            class="host"
            data-theme="light"
            data-state='{"key":"suggestion","model":"Claude Opus 4.8","confidence":0.65,"cost":"0,006–0,012","energy":"0,8–3,2","budget":true,"banner":true,"others":["Claude Haiku 4.5","Claude Sonnet 5"]}'
          ></div>
        </div>
        <div class="cell">
          <span class="lbl">ambigu</span>
          <div
            class="host"
            data-theme="light"
            data-state='{"key":"ambigu","model":"Claude Sonnet 5","confidence":0.55,"cost":"0,002–0,004","energy":"0,4–1,8","mode":true,"others":["Claude Haiku 4.5","Claude Opus 4.8"]}'
          ></div>
        </div>
        <div class="cell">
          <span class="lbl">basculee</span>
          <div
            class="host"
            data-theme="light"
            data-state='{"key":"basculee","model":"Claude Sonnet 5","confidence":0.75,"cost":"0,002–0,004","energy":"0,4–1,8","ack":true,"others":[]}'
          ></div>
        </div>
      </div>
      <div class="col dark">
        <h2>Thème sombre</h2>
        <div class="cell">
          <span class="lbl">reco-simple</span>
          <div
            class="host"
            data-theme="dark"
            data-state='{"key":"reco-simple","model":"Claude Haiku 4.5","confidence":0.8,"cost":"0,0004–0,0006","energy":"0,05–0,21","budget":true,"others":["Claude Sonnet 5","Claude Opus 4.8"]}'
          ></div>
        </div>
        <div class="cell">
          <span class="lbl">derogation</span>
          <div
            class="host"
            data-theme="dark"
            data-state='{"key":"derogation","model":"Claude Haiku 4.5","confidence":0.8,"cost":"0,0004–0,0006","energy":"0,05–0,21","budget":true,"why":true,"others":["Claude Sonnet 5","Claude Opus 4.8"]}'
          ></div>
        </div>
        <div class="cell">
          <span class="lbl">budget-absent</span>
          <div
            class="host"
            data-theme="dark"
            data-state='{"key":"budget-absent","model":"Claude Sonnet 5","confidence":0.7,"cost":"0,002–0,004","energy":"0,4–1,8","budget":false,"others":["Claude Haiku 4.5","Claude Opus 4.8"]}'
          ></div>
        </div>
        <div class="cell">
          <span class="lbl">suggestion</span>
          <div
            class="host"
            data-theme="dark"
            data-state='{"key":"suggestion","model":"Claude Opus 4.8","confidence":0.65,"cost":"0,006–0,012","energy":"0,8–3,2","budget":true,"banner":true,"others":["Claude Haiku 4.5","Claude Sonnet 5"]}'
          ></div>
        </div>
        <div class="cell">
          <span class="lbl">ambigu</span>
          <div
            class="host"
            data-theme="dark"
            data-state='{"key":"ambigu","model":"Claude Sonnet 5","confidence":0.55,"cost":"0,002–0,004","energy":"0,4–1,8","mode":true,"others":["Claude Haiku 4.5","Claude Opus 4.8"]}'
          ></div>
        </div>
        <div class="cell">
          <span class="lbl">basculee</span>
          <div
            class="host"
            data-theme="dark"
            data-state='{"key":"basculee","model":"Claude Sonnet 5","confidence":0.75,"cost":"0,002–0,004","energy":"0,4–1,8","ack":true,"others":[]}'
          ></div>
        </div>
      </div>
    </div>
    <script>
      const CSS =
        '\n  :host {\n    all: initial;\n    /* Thème clair par défaut (charte §4). */\n    --bg: #FFFFFF;\n    --text: #1A1A18;\n    --secondary: #6B6B66;\n    --accent: #0E7C66;\n    --accent-contrast: #FFFFFF;\n    --border: rgba(0, 0, 0, 0.06);\n    --track: rgba(0, 0, 0, 0.08);\n    --banner-bg: rgba(14, 124, 102, 0.08);\n    --shadow: 0 4px 16px rgba(0, 0, 0, 0.08);\n    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;\n  }\n  /* Sombre : suit la préférence système, sauf thème clair explicite de l\'hôte. */\n  @media (prefers-color-scheme: dark) {\n    :host(:not([data-sobrio-theme="light"])) {\n      --bg: #262521;\n      --text: #ECEAE4;\n      --secondary: #A8A69E;\n      --accent: #4FB8A0;\n      --accent-contrast: #1A1A18;\n      --border: rgba(255, 255, 255, 0.08);\n      --track: rgba(255, 255, 255, 0.10);\n      --banner-bg: rgba(79, 184, 160, 0.12);\n      --shadow: 0 4px 16px rgba(0, 0, 0, 0.32);\n    }\n  }\n  /* Le thème posé par la page hôte (classe de thème claude.ai) prime. */\n  :host([data-sobrio-theme="dark"]) {\n    --bg: #262521;\n    --text: #ECEAE4;\n    --secondary: #A8A69E;\n    --accent: #4FB8A0;\n    --accent-contrast: #1A1A18;\n    --border: rgba(255, 255, 255, 0.08);\n    --track: rgba(255, 255, 255, 0.10);\n    --banner-bg: rgba(79, 184, 160, 0.12);\n    --shadow: 0 4px 16px rgba(0, 0, 0, 0.32);\n  }\n  :host([data-sobrio-theme="light"]) {\n    --bg: #FFFFFF;\n    --text: #1A1A18;\n    --secondary: #6B6B66;\n    --accent: #0E7C66;\n    --accent-contrast: #FFFFFF;\n    --border: rgba(0, 0, 0, 0.06);\n    --track: rgba(0, 0, 0, 0.08);\n    --banner-bg: rgba(14, 124, 102, 0.08);\n    --shadow: 0 4px 16px rgba(0, 0, 0, 0.08);\n  }\n  * { box-sizing: border-box; }\n\n  .panel {\n    position: fixed;\n    right: 16px;\n    bottom: 96px;\n    z-index: 2147483646;\n    width: 320px;\n    max-width: 320px;\n    padding: 16px;\n    border: 1px solid var(--border);\n    border-radius: 12px;\n    background: var(--bg);\n    color: var(--text);\n    font: 12px/1.5 var(--font);\n    font-variant-numeric: tabular-nums;\n    box-shadow: var(--shadow);\n    animation: sobrio-in 150ms ease-out;\n  }\n  @keyframes sobrio-in {\n    from { opacity: 0; transform: translateY(4px); }\n    to { opacity: 1; transform: translateY(0); }\n  }\n\n  /* En-tête : titre + fermeture, aligné sur la grille 8. */\n  .header { display: flex; justify-content: space-between; align-items: center; gap: 8px; }\n  .title {\n    font-weight: 600; font-size: 11px; color: var(--secondary);\n    letter-spacing: 0.08em; text-transform: uppercase; margin: 0;\n  }\n  .close {\n    background: none; border: none; padding: 0; width: auto; height: 16px;\n    color: var(--secondary); cursor: pointer; font-size: 16px; line-height: 1;\n    border-radius: 4px;\n  }\n  .close:hover { color: var(--text); }\n\n  .mode-note { color: var(--secondary); font-size: 11px; margin: 8px 0 0; }\n\n  .model { font-size: 13px; font-weight: 600; margin: 8px 0 0; color: var(--text); }\n  .model small { font-weight: 400; color: var(--secondary); }\n\n  /* Jauges : 4 px arrondies, piste neutre, remplissage accent. */\n  .gauge { height: 4px; border-radius: 2px; background: var(--track); overflow: hidden; margin: 8px 0 4px; }\n  .gauge > div { height: 100%; border-radius: 2px; background: var(--accent); }\n  .gauge-label { color: var(--secondary); font-size: 12px; }\n\n  .range { margin: 8px 0 0; }\n  .note { color: var(--secondary); font-style: italic; margin: 8px 0 0; font-size: 12px; }\n\n  .banner {\n    margin-top: 8px; padding: 8px; border-radius: 8px;\n    background: var(--banner-bg); color: var(--text); font-size: 12px;\n  }\n\n  .actions { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }\n  button, select {\n    font: inherit; height: 28px; padding: 0 12px; border-radius: 8px;\n    border: 1px solid var(--border); background: transparent; color: var(--text);\n    cursor: pointer; width: 100%;\n  }\n  select { padding: 0 8px; }\n  button.primary {\n    background: var(--accent); color: var(--accent-contrast); border-color: var(--accent);\n    font-weight: 600;\n  }\n  .hint { color: var(--secondary); font-size: 11px; margin: 0; }\n\n  .why {\n    background: none; border: none; padding: 0; width: auto; height: auto;\n    color: var(--accent); cursor: pointer; font-size: 12px; text-decoration: underline;\n  }\n  .why-text { display: none; }\n  .why-text.visible { display: block; }\n  .ack { font-style: italic; color: var(--accent); margin-top: 16px; font-size: 12px; }\n\n  /* Focus clavier annulaire, visible sur les deux thèmes. */\n  button:focus-visible, select:focus-visible, .close:focus-visible, .why:focus-visible {\n    outline: 2px solid var(--accent); outline-offset: 2px;\n  }\n\n  /* Badge pastille 22 px. */\n  .badge {\n    position: fixed; right: 16px; bottom: 48px; z-index: 2147483646;\n    width: 22px; height: 22px; border-radius: 50%; padding: 0;\n    background: var(--bg); color: var(--text);\n    border: 1px solid var(--border); cursor: pointer;\n    font: 600 11px/20px var(--font); text-align: center;\n    box-shadow: var(--shadow); opacity: 0.85;\n    transition: opacity 120ms ease, transform 120ms ease;\n  }\n  .badge:hover { opacity: 1; transform: scale(1.06); }\n  .badge:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }\n';
      const LAYOUT =
        '.panel,.badge{position:static !important;right:auto;bottom:auto;animation:none;margin:0}';
      function markup(s) {
        function panelMarkup(state) {
          const parts = [];
          parts.push(`<div class="header"><div class="title">Sobrio</div>
    <button class="close" type="button" aria-label="Fermer le panneau">×</button></div>`);
          if (state.mode) {
            parts.push(
              `<div class="mode-note">Équilibre coût / qualité : le modèle proposé vise le juste nécessaire.</div>`,
            );
          }
          parts.push(`<div class="model">${state.model} <small>recommandé</small></div>`);
          parts.push(`<div class="gauge" role="progressbar"><div style="width:${Math.round(state.confidence * 100)}%"></div></div>
    <div class="gauge-label">Confiance : ${Math.round(state.confidence * 100)} %</div>`);
          if (state.confidence < 0.65) {
            parts.push(
              `<p class="note">Signal ambigu — si cette conversation demande un raisonnement complexe, préférez un modèle plus capable.</p>`,
            );
          }
          parts.push(`<div class="range">Coût estimé : ${state.cost} € / appel</div>`);
          parts.push(
            `<div class="range">Énergie estimée : ${state.energy} Wh · périmètre : inférence</div>`,
          );
          if (state.budget) {
            parts.push(`<div class="gauge" data-sobrio-budget><div style="width:42%"></div></div>
      <div class="gauge-label">Budget Équipe démo : 42 % utilisé</div>`);
          }
          if (state.banner) {
            parts.push(
              `<div class="banner">Conversation longue — repartir d'une nouvelle conversation coûtera probablement moins.</div>`,
            );
          }
          parts.push(`<button class="why" type="button">Pourquoi ?</button>
    <p class="note why-text${state.why ? ' visible' : ''}">Votre demande semble courte et simple : un modèle léger suffit probablement.</p>`);
          if (state.ack) {
            parts.push(`<div class="actions"><div class="ack">Merci, c'est noté.</div></div>`);
          } else {
            const opts = state.others.map((m) => `<option>${m}</option>`).join('');
            parts.push(`<div class="actions">
      <button class="primary" type="button">Utiliser ${state.model}</button>
      <p class="hint">Note votre intention.</p>
      <select aria-label="Choisir un autre modèle">${state.others.length ? `<option>Choisir un autre modèle…</option>${opts}` : ''}</select>
    </div>`);
          }
          return parts.join('\n');
        }
        return panelMarkup(s);
      }
      for (const host of document.querySelectorAll('.host')) {
        const s = JSON.parse(host.getAttribute('data-state'));
        host.setAttribute('data-sobrio-theme', host.getAttribute('data-theme'));
        const root = host.attachShadow({ mode: 'open' });
        const style = document.createElement('style');
        style.textContent = CSS + LAYOUT;
        root.appendChild(style);
        const panel = document.createElement('div');
        panel.className = 'panel';
        panel.innerHTML = markup(s);
        root.appendChild(panel);
      }
      document.title = 'ready';
    </script>
  </body>
</html>

# Sobrio — CI (Lot 0). Deux jobs : python (lint + tests, Postgres 16 en service)
# et node (extension : install, lint, test, build).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sobrio
          POSTGRES_PASSWORD: sobrio_dev_password
          POSTGRES_DB: sobrio
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://sobrio:sobrio_dev_password@localhost:5432/sobrio
    steps:
      - uses: actions/checkout@v4

      - name: Dépendances système WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libharfbuzz-subset0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation des dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt -r connector/requirements.txt \
                      -r warehouse/requirements.txt -r report/requirements.txt
          pip install -e ./warehouse -e ./router

      # Garde R6 (spec §10.7, cost-guard) : la CI ne pose JAMAIS de flag
      # SOBRIO_* (ni SOBRIO_EMBED_STAGE2, ni SOBRIO_ALLOW_MODEL_DOWNLOAD, ni
      # aucun autre) et n'installe JAMAIS les dépendances embed
      # (router/requirements-embed.txt) — la suite complète ci-dessous passe
      # sans réseau, sans modèle, avec des skips propres (les simulations
      # clone-frais/sans-deps §10.6 sont DES TESTS de la suite). Vérification
      # EXÉCUTABLE, pas seulement par inspection du fichier.
      - name: Garde R6 — aucun flag SOBRIO_*, aucune dépendance embed
        run: |
          if env | grep '^SOBRIO_'; then
            echo "ERREUR : un flag SOBRIO_* est posé dans l'environnement CI (interdit, R6 §10.7)"
            exit 1
          fi
          python -c 'import importlib.util, sys; presents = [m for m in ("onnxruntime", "tokenizers") if importlib.util.find_spec(m) is not None]; sys.exit("ERREUR : dependances embed presentes en CI (interdit, R6 §10.7) : " + ", ".join(presents) if presents else 0)'

      - name: Lint (ruff)
        run: ruff check router api connector warehouse report

      - name: Tests (pytest)
        run: pytest router/tests api/tests connector/tests warehouse/tests report/tests

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Installation
        run: pnpm -C extension install

      - name: Lint
        run: pnpm -C extension lint

      - name: Tests
        run: pnpm -C extension test

      - name: Build
        run: pnpm -C extension build

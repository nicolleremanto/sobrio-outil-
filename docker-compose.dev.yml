# Environnement de développement Sobrio — Postgres 16 + Adminer + API (reload).
# Usage : make dev   (ou : docker compose -f docker-compose.dev.yml up -d)
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sobrio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sobrio_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-sobrio}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sobrio} -d ${POSTGRES_DB:-sobrio}"]
      interval: 3s
      timeout: 3s
      retries: 20

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sobrio}:${POSTGRES_PASSWORD:-sobrio_dev_password}@postgres:5432/${POSTGRES_DB:-sobrio}
      MODEL_CATALOG_PATH: /repo/contracts/model_catalog.yaml
      DEMO_ORG_TOKEN: ${DEMO_ORG_TOKEN:-demo-token-not-a-secret}
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./api:/repo/api
      - ./contracts:/repo/contracts:ro
      - ./warehouse:/repo/warehouse
    working_dir: /repo/api
    ports:
      - "${SOBRIO_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:

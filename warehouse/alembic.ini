# Sobrio — Lot D : configuration Alembic de l'entrepôt.
#
# Commande canonique (DEPUIS LA RACINE du repo) :
#   .venv/bin/alembic -c warehouse/alembic.ini upgrade head
#
# `%(here)s` = répertoire de ce fichier (warehouse/) : le chemin tient
# quel que soit le répertoire courant.

[alembic]
script_location = %(here)s/alembic

# URL laissée vide VOLONTAIREMENT : résolue par env.py depuis DATABASE_URL
# (défaut : postgresql+psycopg://sobrio:sobrio_dev_password@localhost:5432/sobrio).
# Règle n°5 : aucun identifiant réel commité.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S
